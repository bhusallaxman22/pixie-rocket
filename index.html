<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Pixi Rocket Arena</title>
  </head>
  <body>
    <div id="app" class="in-lobby">
      <section class="lobby" aria-label="Lobby">
        <div class="lobby-shell">
          <div class="lobby-hero">
            <div class="lobby-brand">
              <span>Pixi Rocket Arena</span>
              <strong>Private Multiplayer</strong>
            </div>
            <div class="arena-preview" aria-hidden="true">
              <span class="preview-line center"></span>
              <span class="preview-line goal blue"></span>
              <span class="preview-line goal orange"></span>
              <span class="preview-ball"></span>
              <span class="preview-car blue"></span>
              <span class="preview-car orange"></span>
            </div>
            <div class="lobby-stats" aria-label="Match setup">
              <div>
                <span>Mode</span>
                <strong>Private</strong>
              </div>
              <div>
                <span>Arena</span>
                <strong>3D Full Field</strong>
              </div>
              <div>
                <span>Audio</span>
                <strong class="active-track-name">Overtime Pulse</strong>
              </div>
            </div>
          </div>

          <div class="lobby-panel">
            <div class="panel-head">
              <span>Match Lobby</span>
              <div class="lobby-status" aria-label="Connection">
                <span class="status-dot"></span>
                <span class="status-text">Connecting</span>
              </div>
            </div>

            <form class="join-form">
              <div class="field-pair">
                <label for="name-input">Driver</label>
                <input id="name-input" name="name" type="text" autocomplete="off" maxlength="16" />
              </div>
              <div class="field-pair">
                <label for="room-input">Room</label>
                <div class="join-row">
                  <input id="room-input" name="room" type="text" autocomplete="off" maxlength="18" />
                  <button type="button" class="random-room" aria-label="New room"></button>
                </div>
              </div>

              <div class="soundtrack-panel">
                <div class="soundtrack-head">
                  <span>Soundtrack</span>
                  <button type="button" class="audio-toggle" aria-pressed="false">Sound On</button>
                </div>
                <div class="track-list" role="radiogroup" aria-label="Soundtrack">
                  <button type="button" class="track-option" data-track="overtime-pulse" role="radio" aria-checked="true">
                    <span class="track-bars" aria-hidden="true"><i></i><i></i><i></i></span>
                    <span><strong>Overtime Pulse</strong><em>132 BPM</em></span>
                  </button>
                  <button type="button" class="track-option" data-track="neon-kickoff" role="radio" aria-checked="false">
                    <span class="track-bars" aria-hidden="true"><i></i><i></i><i></i></span>
                    <span><strong>Neon Kickoff</strong><em>146 BPM</em></span>
                  </button>
                  <button type="button" class="track-option" data-track="midfield-drift" role="radio" aria-checked="false">
                    <span class="track-bars" aria-hidden="true"><i></i><i></i><i></i></span>
                    <span><strong>Midfield Drift</strong><em>118 BPM</em></span>
                  </button>
                </div>
              </div>

              <button class="play-button" type="submit">Play</button>
            </form>
          </div>
        </div>
      </section>

      <div class="hud">
        <section class="match-chip" aria-label="Room">
          <span class="match-room">arena</span>
        </section>
        <section class="scoreboard" aria-label="Scoreboard">
          <span class="team blue">0</span>
          <span class="clock">05:00</span>
          <span class="team orange">0</span>
        </section>
        <section class="drive-panel" aria-label="Drive telemetry">
          <div class="speed-readout">
            <span class="speed-value">0</span>
            <span class="speed-unit">KMH</span>
          </div>
          <div class="boost-gauge" aria-label="Boost">
            <span class="boost-value">100</span>
          </div>
        </section>
      </div>

      <div class="touch-controls" aria-label="Touch controls">
        <div class="drive-stick" data-drive-stick role="group" aria-label="Steer, throttle, and reverse">
          <span class="drive-stick-ring" aria-hidden="true"></span>
          <span class="drive-stick-axis horizontal" aria-hidden="true"></span>
          <span class="drive-stick-axis vertical" aria-hidden="true"></span>
          <span class="drive-stick-knob" aria-hidden="true"></span>
        </div>
        <div class="touch-actions">
          <button class="touch-action boost" data-touch="boost" aria-label="Boost"><span class="touch-icon boost"></span></button>
          <button class="touch-action jump" data-touch="jump" aria-label="Jump"><span class="touch-icon jump"></span></button>
          <button class="touch-action reverse" data-touch="down" aria-label="Reverse"><span class="touch-icon reverse"></span></button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
